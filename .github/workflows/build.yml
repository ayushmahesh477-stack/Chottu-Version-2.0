name: Build Chottu Desktop App

on:
  push:
    tags:
      - 'v*'              # Triggers when you push a tag like v2.0.0
  workflow_dispatch:      # Also allows manual trigger from GitHub UI

permissions:
  contents: write         # Required to attach files to release

jobs:
  # ==================== WINDOWS BUILD ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Chottu
        run: npm run tauri build
        working-directory: ./frontend

      - name: Upload Windows installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chottu-windows
          path: ./frontend/src-tauri/target/release/bundle/nsis/*.exe

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./frontend/src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== macOS BUILD ====================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Chottu
        run: npm run tauri build
        working-directory: ./frontend

      - name: Upload macOS installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chottu-macos
          path: ./frontend/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./frontend/src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== LINUX BUILD ====================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Chottu
        run: npm run tauri build
        working-directory: ./frontend

      - name: Upload Linux installers as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chottu-linux
          path: |
            ./frontend/src-tauri/target/release/bundle/deb/*.deb
            ./frontend/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./frontend/src-tauri/target/release/bundle/deb/*.deb
            ./frontend/src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
