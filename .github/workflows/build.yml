name: Build Chottu Desktop App

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v2.0.0

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      - name: Build Chottu
        run: npm run tauri build
        working-directory: ./frontend
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: chottu-windows
          path: ./frontend/src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    # Similar steps for macOS...
    # Will produce .dmg file

  build-linux:
    runs-on: ubuntu-latest
    # Similar steps for Linux...
    # Will produce .deb, .rpm, .AppImage files
